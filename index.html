
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحدي مورس الكشفي ⚜️</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2e7d32;
            --accent-color: #fbc02d;
            --bg-gradient: linear-gradient(135deg, #a8e063 0%, #56ab2f 100%);
            --card-bg: #ffffff;
            --text-dark: #2c3e50;
        }

        * {
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif !important;
        }

        body {
            background: var(--bg-gradient);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        .container {
            background: var(--card-bg);
            width: 100%;
            max-width: 450px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            /* Removed padding-top so title sits at the very top */
            padding: 0 30px 30px 30px; 
            text-align: center;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Responsive Title Styling */
        h1 {
            background-color: var(--primary-color);
            color: #ffffff;
            margin: 0 -30px 10px -30px; /* Pulls title to the edges of the container */
            padding: 20px 10px;
            font-size: 1.5rem;
            font-weight: 900;
            z-index: 2;
            /* Matches your original height/style but is now responsive */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80px;
        }

        .morse-display {
            background: #2c3e50;
            color: #ffffff;
            padding: 30px 15px;
            border-radius: 15px;
            font-size: 32px;
            min-height: 120px;
            display: flex;
            justify-content: center;
            font-family:'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif !important;
            align-items: center;
            word-break: break-all;
            line-height: 1.4;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.3);
            letter-spacing: 2px;
        }

        input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1.1rem;
            text-align: center;
            outline: none;
            transition: border-color 0.3s ease;
        }

        input:focus {
            border-color: var(--primary-color);
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
        }

        button:active {
            transform: scale(0.98);
        }

        #submit_word {
            background-color: var(--primary-color);
            color: white;
        }

        #new_word {
            background-color: var(--accent-color);
            color: var(--text-dark);
        }

        #the_answear {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--accent-color);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.8rem;
            font-weight: 900;
            z-index: 10;
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.3s ease;
            padding: 20px;
        }

        #the_answear[style*="visible"] {
            opacity: 1;
        }

        @media (max-width: 450px) {
            h1 {
                font-size: 1.3rem;
                padding: 15px 5px;
            }
            .morse-display {
                font-size: 1.5rem;
                min-height: 100px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>تحدي المورس الكشفي ⚜️</h1>
        
        <div id="the_answear" onclick="this.style.visibility='hidden'">الأجابة هي:</div>
        <div id="morseBox" class="morse-display">....</div>
        <input type="text" id="answer" placeholder="اكتب إجابتك هنا" autocomplete="off"/>
        
        <div class="controls">
            <button id="submit_word" onclick="revealAnswer()">تحقق من الإجابة</button>
            <button id="new_word" onclick="newChallenge()">كلمة جديدة</button>
        </div>
    </div>
  
    <script>
        const morseDict = {
            'أ': '._', 'ب': '_...', 'ت': '_', 'ث': '_._.', 'ج': '._ _ _', 
            'ح': '....', 'خ': '_ _ _', 'د': '_..', 'ذ': '_ _ ..', 'ر': '._.', 
            'ز': '_ _ _ .', 'س': '...', 'ش': '_ _ _ _', 'ص': '_.._', 'ض': '..._', 
            'ط': '.._', 'ظ': '_ _ . _', 'ع': '._._', 'غ': '_ _ .', 'ف': '.._.', 
            'ق': '_ . _ _', 'ك': '_._', 'ل': '._..', 'م': '_ _', 'ن': '_.', 
            'ه': '.._..', 'و': '. _ _', 'ي': '..', 'ء': '.','ة': '_','ا':'._','آ': '._','ئ':'.'
        };

        const words = ["شجرة","نهر","جبل","بحر","سماء","قمر","شمس","نجمة","غابة","صحراء","وادي","سهل","هضبة","جزيرة","شاطئ","محيط","خليج","بركان","كهف","مطر","ثلج","ريح","عاصفة","سحاب","ضباب","ندى","صقيع","رعد","برق","قوس","قزح","مدينة","قرية","شارع","طريق","جسر","مطار","ميناء","محطة","مدرسة","جامعة","مكتبة","مستشفى","حديقة","ملعب","سوق","متجر","بنك","شركة","مصنع","مزرعة","قصر","قلعة","برج","منزل","غرفة","مطبخ","حمام","نافذة","باب","مفتاح","قفل","كرسي","طاولة","سرير","وسادة","بطانية","سجاد","ستارة","مصباح","ساعة","دقيقة","ثانية","يوم","أسبوع","شهر","سنة","ليل","نهار","صباح","مساء","فجر","غروب","إنسان","طفل","رجل","امرأة","صديق","عدو","جار","معلم","طبيب","مهندس","كاتب","شاعر","فنان","لاعب","مدرب","قائد","جندي","ملك","وزير","رئيس","قاض","محامي","طالب","تلميذ","قلم","دفتر","كتاب","ورقة","سبورة","حقيبة","حاسوب","هاتف","شاشة","لوحة","مفاتيح","بطارية","شاحن","كهرباء","طاقة","نور","ظلام","حب","أمل","خوف","شجاعة","نجاح","فشل","قوة","ضعف","صبر","كرم","صدق","أمانة","احترام","تعاون","سلام","حرب","حرية","عدالة","مسؤولية","ذكاء","خيال","إبداع","ابتكار","اختراع","اكتشاف","علم","معرفة","درس","واجب","لغة","كلمة","حرف","جملة","عدد","رقم","عملية","نتيجة","سؤال","جواب","فكرة","رأي","قلب","عقل","روح","جسد","ابتسامة","ضحكة","حزن","فرح","حلم","واقع","ذكرى","مستقبل","ماضي","حاضر","رحلة","سفر","مغامرة","سيارة","قطار","طائرة","سفينة","دراجة","حافلة","حصان","جمل","أسد","نمر","فيل","زرافة","قرد","طائر","عصفور","نسر","سمكة","حوت","دلفين","نحلة","فراشة","نملة","تفاح","برتقال","موز","عنب","قمح","أرز","خبز","ماء","هواء","نار","تراب","ذهب","فضة","ألماس","ياقوت","زمرد","لؤلؤ","حديد","خشب","زجاج","بلاستيك","نحاس","رصاص","حجر","صخرة","رمل","طين","بذرة","نبتة","زهرة","وردة","عشب","ثمرة","حداد","نجار","خباز","طباخ","شرطي","إطفائي","ممرض","صيدلي","سائق","طيار","بحار","زارع","تاجر","محاسب","مبرمج","مصمم","مصور","صحفي","مذيع","مخرج","مؤلف","رسام","نحات","موسيقي","مغني","ممثل","راقص","حارس","عامل","مدير","رائد","عريف","كشاف","مرشد","بوصلة","خريطة","اتجاه","شمال","جنوب","شرق","غرب","قارة","دولة","عاصمة","وطن","علم","فداء","همة","نشاط","حيوية"];

        let currentWord = "";
        const answerInput = document.getElementById("answer");
        const feedbackOverlay = document.getElementById("the_answear");

        function translateToMorse(word) {
            return word.split('').map(char => {
                return morseDict[char] || char;
            }).join(' / ');
        }

        function newChallenge() {
            currentWord = words[Math.floor(Math.random() * words.length)];
            document.getElementById('morseBox').innerText = translateToMorse(currentWord);
            feedbackOverlay.style.visibility = "hidden";
            answerInput.value = "";
        }

        function repeat(){
            currentWord = words[Math.floor(Math.random() * words.length)];
            document.getElementById('morseBox').innerText = translateToMorse(currentWord);
        }

        function revealAnswer() {
            const userVal = answerInput.value.trim();
            if (userVal === "") {
                alert("يرجى إدخال إجابة");
                return;
            }

            feedbackOverlay.style.visibility = "visible";
            
            if (userVal === currentWord) {
                feedbackOverlay.style.backgroundColor = "#2e7d32";
                feedbackOverlay.innerText = "أحسنت! الإجابة صحيحة ✅";
                answerInput.value = "";
                setTimeout(newChallenge, 2000);
            } else {
                feedbackOverlay.style.backgroundColor = "#d32f2f";
                feedbackOverlay.innerText = "خطأ ❌ الإجابة الصحيحة هي: " + currentWord;
                answerInput.value = "";
                setTimeout(() => {
                    feedbackOverlay.style.visibility = "hidden";
                    repeat();
                }, 2000);
            }
        }

        repeat();
    </script>
</body>
</html>
